name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Set a branch name to trigger deployment
  repository_dispatch:
    types: [feeds-updated]  # Triggered by the feeds repo when movies.json
                            # or books.json changes; rebuilds the garden so
                            # auto-stub pages stay in sync with the data
                            # source without a manual push.
  workflow_dispatch:        # Allow manual reruns from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-22.04
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    env:
      # Opt in early to the Node 24 runtime that becomes the default on
      # 2026-06-02. Surfaces incompatibilities (currently in
      # peaceiris/actions-hugo@v3 and peaceiris/actions-gh-pages@v4,
      # which still ship Node 20) before GitHub forces the switch.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true  # Fetch Hugo themes (true OR recursive)
          fetch-depth: 0    # Fetch all history for .GitInfo and .Lastmod

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          # You need to create a Personal Access Token (PAT) with `repo` scope and add it to your repository secrets as PERSONAL_TOKEN
          personal_token: ${{ secrets.PERSONAL_TOKEN }}
          
          # Deploying to stultus/notes repository
          external_repository: stultus/notes
          
          publish_branch: main # or gh-pages, or master depending on where you host
          publish_dir: ./public
          keep_files: false
          user_name: stultus
          user_email: stultus@stultus.in
          commit_message: ${{ github.event.commits[0].message }}

