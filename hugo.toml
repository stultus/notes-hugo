baseURL = "https://stultus.in/notes/"
languageCode = "en-us"
title = "stultus notes"
theme = "kavu"
themesdir = "./themes"
copyright = "Hrishikesh Bhaskaran ♥"
relativeURLs = false
canonifyURLs = false
enableRobotsTXT = true

[params]
  name = "Hrishikesh Bhaskaran"
  description = "The digital garden of Hrishikesh Bhaskaran (stultus) — a growing collection of notes, ideas, and explorations on software engineering, FOSS, language computing, and more."
  initials = "stultus notes"
  googleAnalytics = ""

  # Kavu theme params (the live site sets these to preserve its existing
  # branding; they are all optional and the theme degrades gracefully
  # without them).
  author = "Hrishikesh Bhaskaran"
  authorURL = "https://stultus.in/about/"
  tagline = "Digital Garden by Hrishikesh Bhaskaran"
  twitterHandle = "@_stultus"
  defaultOgImage = "https://stultus.in/img/hrishikesh_bhaskaran-bnw.png"
  keywords = ["Hrishikesh Bhaskaran", "stultus", "Hrishi", "digital garden", "notes", "software engineering"]
  headerLogoURL = "https://stultus.in/"
  headerBrandText = "stultus"
  headerLogoLight = "img/logo-light.png"
  headerLogoDark = "img/logo-dark.png"

  [[params.social]]
    name = "Twitter"
    link = "https://x.com/_stultus/"
    icon = "fab fa-twitter"

  [[params.social]]
    name = "Github"
    link = "https://github.com/stultus"
    icon = "fab fa-github"

  [[params.social]]
    name = "LinkedIn"
    link = "https://www.linkedin.com/in/stultus/"
    icon = "fab fa-linkedin-in"

  [[params.social]]
    name = "Instagram"
    link = "https://instagram.com/stultusz"
    icon = "fab fa-instagram"

  [[params.social]]
    name = "Facebook"
    link = "https://www.facebook.com/stultus.hrishi"
    icon = "fab fa-facebook"

  [[params.footerLinks]]
    name = "Website"
    url = "https://stultus.in"

  [[params.footerLinks]]
    name = "About"
    url = "https://stultus.in/about"

  [[params.footerLinks]]
    name = "Friends"
    url = "/notes/friends/"

  [[params.footerLinks]]
    name = "What is this?"
    url = "/notes/digital_garden/"


[menu]
  [[menu.main]]
    name = "blog"
    url = "https://stultus.in/post/"
    weight = 1
  [[menu.main]]
    name = "projects"
    url = "https://stultus.in/projects/"
    weight = 2
  [[menu.main]]
    name = "now"
    url = "https://stultus.in/now/"
    weight = 3
  [[menu.main]]
    name = "about"
    url = "https://stultus.in/about/"
    weight = 4
  [[menu.main]]
    name = "notes"
    url = "https://stultus.in/notes/"
